; BS2026 DefaultEngine.ini
; Engine configuration for the BS2026 multiplayer vehicular combat project.
; Only the settings that differ from UE5 defaults are listed here.
; Renderer, platform, and hardware settings will be generated by the Unreal Editor
; on first launch.

[/Script/OnlineSubsystemUtils.IpNetDriver]
; 60 Hz server tick keeps physics state and GAS updates smooth
NetServerMaxTickRate=60
; Allow up to 100 kbps per client for physics state replication
MaxClientRate=100000
MaxInternetClientRate=15000

[OnlineSubsystem]
; Null subsystem enables PIE multi-client testing without EOS credentials.
; Switch to EOS or Steam in production by changing this value and adding
; the corresponding plugin to BS2026.uproject.
DefaultPlatformService=Null
